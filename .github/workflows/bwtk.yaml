name: bwtk-build
on: push

jobs:
  macos:
    runs-on: macos-latest
    if: contains(github.event.head_commit.message, 'build_me')
    steps:
      - name: clone
        uses: actions/checkout@v4
      - name: build
        run: make libz libBigWig && make release
      - name: smoke
        run: ./bwtk version
      - name: test
        run: cd test && bash test_suite.sh
  ubuntu:
    strategy:
      matrix:
        cc: [gcc, clang]
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'build_me')
    steps:
      - name: clone
        uses: actions/checkout@v4
      - name: build
        run: make libz libBigWig && make release CC=${{ matrix.cc }}
      - name: smoke
        run: ./bwtk version
      - name: test
        run: cd test && bash test_suite.sh
  debug:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'build_me')
    steps:
      - name: clone
        uses: actions/checkout@v4
      - name: build
        run: make libz libBigWig && make debug
      - name: test
        run: cd test && BWTK_DEBUG=1 bash test_suite.sh
